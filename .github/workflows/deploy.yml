name: Deploy to Flywheel Production

on:
  push:
    branches:
      - main

# Only one deploy at a time, queue newer pushes
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH Deploy → Flywheel Production
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      THEME_PATH: /www/wp-content/themes/rolling-reno-v2
      BACKUP_PATH: /www/_deploy-backups
      SITE_URL: https://rollingreno.com

    steps:
      - name: Notify Slack - deploy starting
        if: always()
        run: |
          printf -v MESSAGE '🚀 *Deploy starting* - `%s` → production\nCommit: `%s` by %s\nRun: <%s/%s/actions/runs/%s|View>' \
            "rolling-reno-v2" \
            "${GITHUB_SHA::7}" \
            "${GITHUB_ACTOR}" \
            "${{ github.server_url }}" \
            "${{ github.repository }}" \
            "${{ github.run_id }}"
          PAYLOAD=$(jq -n \
            --arg channel "C0AQLB1JXBL" \
            --arg text "$MESSAGE" \
            '{channel: $channel, text: $text}')

          curl -sf -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD" || true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.FLYWHEEL_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.FLYWHEEL_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pre-deploy asset & file check
        run: |
          ERRORS=0

          for file in style.css functions.php index.php; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing critical file: $file"
              ERRORS=$((ERRORS + 1))
            fi
          done

          for dir in assets/css assets/js; do
            if [ ! -d "$dir" ] || [ -z "$(ls -A "$dir")" ]; then
              echo "❌ Missing or empty directory: $dir/"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ -f "style.css" ]; then
            if ! grep -q "Theme Name:" style.css; then
              echo "❌ style.css missing 'Theme Name:' header"
              ERRORS=$((ERRORS + 1))
            fi
          fi

          if [ $ERRORS -gt 0 ]; then
            echo "❌ Pre-deploy check failed with $ERRORS error(s). Deploy blocked."
            exit 1
          fi

          echo "✅ Pre-deploy validation passed."
          echo "   Files: $(find . -type f -not -path './.git/*' -not -path './.github/*' -not -path './node_modules/*' | wc -l | tr -d ' ')"
          echo "   CSS:   $(du -sh assets/css/ | cut -f1)"
          echo "   JS:    $(du -sh assets/js/ | cut -f1)"

      - name: Backup current theme on server
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.FLYWHEEL_SSH_USER }}@${{ secrets.FLYWHEEL_SSH_HOST }}" \
            "mkdir -p ${{ env.BACKUP_PATH }} && \
             cp -a ${{ env.THEME_PATH }} ${{ env.BACKUP_PATH }}/rolling-reno-v2_${TIMESTAMP} && \
             cd ${{ env.BACKUP_PATH }} && \
             ls -1dt rolling-reno-v2_* | tail -n +4 | xargs rm -rf 2>/dev/null; \
             echo '✅ Backup created: rolling-reno-v2_${TIMESTAMP}'; \
             echo 'Backups on disk:'; ls -1dt rolling-reno-v2_* 2>/dev/null"

      - name: Deploy theme files via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='*.md' \
            --exclude='.gitignore' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ \
            "${{ secrets.FLYWHEEL_SSH_USER }}@${{ secrets.FLYWHEEL_SSH_HOST }}:${{ env.THEME_PATH }}/" \
            | tee /tmp/rsync-output.txt

          echo ""
          echo "--- Deploy Summary ---"
          SENT=$(grep -c '^' /tmp/rsync-output.txt 2>/dev/null || echo "0")
          echo "Lines of rsync output: $SENT"
          echo "Files transferred: $(grep -c '^[^.]' /tmp/rsync-output.txt 2>/dev/null || echo 'unknown')"
          DELETED=$(grep -c 'deleting' /tmp/rsync-output.txt 2>/dev/null || echo "0")
          echo "Files deleted: $DELETED"

      - name: Set file permissions
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.FLYWHEEL_SSH_USER }}@${{ secrets.FLYWHEEL_SSH_HOST }}" \
            "find ${{ env.THEME_PATH }} -type d -exec chmod 755 {} \; && \
             find ${{ env.THEME_PATH }} -type f -exec chmod 644 {} \;"

      - name: Purge WordPress/Flywheel/W3 Total Cache
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.FLYWHEEL_SSH_USER }}@${{ secrets.FLYWHEEL_SSH_HOST }}" 'bash -s' <<'REMOTE_CACHE_PURGE'
          set -e
          cat > /tmp/rolling-reno-cache-purge.php <<'PHP'
          <?php
          require '/www/wp-load.php';

          $errors = 0;

          if (function_exists('w3tc_flush_all')) {
              w3tc_flush_all();
              echo "✅ W3 Total Cache: flushed all caches\n";
          } else {
              echo "ℹ️ W3 Total Cache flush function unavailable; plugin may be inactive.\n";
          }

          if (function_exists('wp_cache_flush')) {
              $result = wp_cache_flush();
              if ($result === false) {
                  echo "⚠️ WordPress object cache flush returned false\n";
                  $errors++;
              } else {
                  echo "✅ WordPress object cache: flushed\n";
              }
          }

          exit($errors > 0 ? 1 : 0);
          PHP

          php /tmp/rolling-reno-cache-purge.php
          php /www/fw-flush-cache.php
          rm -f /tmp/rolling-reno-cache-purge.php
          REMOTE_CACHE_PURGE

          echo "⏳ Waiting 10s for cache purge to propagate..."
          sleep 10

      - name: Post-deploy cache-busting production verification
        run: |
          ERRORS=0
          CACHE_BUST="deploy-${GITHUB_SHA::7}-$(date +%s)"

          check_page() {
            local label="$1"
            local path="$2"
            local url="${{ env.SITE_URL }}${path}"
            local busted_url="$url"

            if [[ "$url" == *"?"* ]]; then
              busted_url="${url}&deploy_check=${CACHE_BUST}"
            else
              busted_url="${url}?deploy_check=${CACHE_BUST}"
            fi

            HTTP_CODE=$(curl -sL -o /tmp/page-check.html -w "%{http_code}" "$busted_url" --max-time 20)
            PAGE_SIZE=$(wc -c < /tmp/page-check.html 2>/dev/null || echo "0")

            if [ "$HTTP_CODE" != "200" ]; then
              echo "❌ $label returned HTTP $HTTP_CODE for $busted_url"
              ERRORS=$((ERRORS + 1))
              return
            fi

            if ! grep -q "/wp-content/themes/rolling-reno-v2" /tmp/page-check.html; then
              echo "❌ $label did not reference rolling-reno-v2 assets"
              ERRORS=$((ERRORS + 1))
            fi

            if grep -qi "Uncategorized" /tmp/page-check.html; then
              echo "❌ $label exposes Uncategorized text after deploy"
              ERRORS=$((ERRORS + 1))
            fi

            echo "✅ $label: HTTP 200, ${PAGE_SIZE} bytes, cache-busted URL verified"
          }

          check_page "Homepage" "/"
          check_page "Blog" "/blog/"
          check_page "Search" "/?s=renovation"

          for css_file in design-system.css main.css; do
            CSS_URL="${{ env.SITE_URL }}/wp-content/themes/rolling-reno-v2/assets/css/${css_file}?deploy_check=${CACHE_BUST}"
            HTTP_CODE=$(curl -sL -o /tmp/css-check -w "%{http_code}" "$CSS_URL" --max-time 20)
            CSS_SIZE=$(wc -c < /tmp/css-check 2>/dev/null || echo "0")

            if [ "$HTTP_CODE" != "200" ]; then
              echo "❌ $css_file: HTTP $HTTP_CODE"
              ERRORS=$((ERRORS + 1))
            elif [ "$CSS_SIZE" -lt 1000 ]; then
              echo "❌ $css_file: suspiciously small (${CSS_SIZE} bytes)"
              ERRORS=$((ERRORS + 1))
            else
              echo "✅ $css_file: HTTP 200, ${CSS_SIZE} bytes"
            fi
          done

          echo "SMOKE_TEST_ISSUES=$ERRORS" >> $GITHUB_ENV

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "❌ Production verification failed with $ERRORS issue(s). Cache purge/deploy requires manual attention."
            exit 1
          fi

          echo ""
          echo "✅ Cache purge and production verification passed."

      - name: Notify Slack - deploy complete
        if: success()
        run: |
          SMOKE_STATUS=""
          if [ "${SMOKE_TEST_ISSUES:-0}" -gt 0 ]; then
            SMOKE_STATUS=" ⚠️ Smoke test: ${SMOKE_TEST_ISSUES} issue(s) - check run logs"
          else
            SMOKE_STATUS=" ✅ Smoke test passed"
          fi

          printf -v MESSAGE '✅ *Deploy complete* - `%s` → production\nCommit: `%s` by %s%s\nRun: <%s/%s/actions/runs/%s|View>' \
            "rolling-reno-v2" \
            "${GITHUB_SHA::7}" \
            "${GITHUB_ACTOR}" \
            "${SMOKE_STATUS}" \
            "${{ github.server_url }}" \
            "${{ github.repository }}" \
            "${{ github.run_id }}"
          PAYLOAD=$(jq -n \
            --arg channel "C0AQLB1JXBL" \
            --arg text "$MESSAGE" \
            '{channel: $channel, text: $text}')

          curl -sf -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD" || true

      - name: Notify Slack - deploy failed
        if: failure()
        run: |
          printf -v MESSAGE '❌ *Deploy FAILED* - `%s` → production\nCommit: `%s` by %s\nRun: <%s/%s/actions/runs/%s|View>' \
            "rolling-reno-v2" \
            "${GITHUB_SHA::7}" \
            "${GITHUB_ACTOR}" \
            "${{ github.server_url }}" \
            "${{ github.repository }}" \
            "${{ github.run_id }}"
          PAYLOAD=$(jq -n \
            --arg channel "C0AQLB1JXBL" \
            --arg text "$MESSAGE" \
            '{channel: $channel, text: $text}')

          curl -sf -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD" || true
